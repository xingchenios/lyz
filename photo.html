<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给刘雨珍的一封信💌</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100vw;
            min-height: 100vh;
            /* 统一粉色背景，和首页/烟花页无缝衔接 */
            background: #ffebee;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 60px;
            padding: 40px;
            font-family: "楷体", "Microsoft YaHei", "PingFang SC", sans-serif;
        }
        /* 左侧照片卡片：圆角阴影，精致简约 */
        .photo-card {
            width: 500px;
            height: 600px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(255, 107, 157, 0.15);
            animation: fadeInLeft 1.5s ease-out;
        }
        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* 右侧书信卡片：白色底，柔和阴影，手写感样式 */
        .letter-card {
            width: 600px;
            min-height: 600px;
            background: #fff;
            border-radius: 20px;
            padding: 60px 50px;
            box-shadow: 0 15px 40px rgba(255, 107, 157, 0.15);
            animation: fadeInRight 1.5s ease-out 0.3s both;
            position: relative;
        }
        /* 书信标题：亲爱的XX，字体稍大，柔和黑色 */
        .letter-title {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 40px;
        }
        /* 书信内容：手写楷体感，大行距，首行缩进，更贴近真实书信 */
        .letter-content {
            font-size: 1.6rem;
            line-height: 2.2;
            color: #333;
            text-indent: 2em;
            margin-bottom: 50px;
        }
        /* 书信落款：右对齐，和真实书信一致 */
        .letter-sign {
            font-size: 1.6rem;
            color: #333;
            text-align: right;
        }
        /* 左滑入动画：照片从左侧进入 */
        @keyframes fadeInLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        /* 右滑入动画：书信从右侧进入，有延迟更有层次 */
        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        /* 平板/手机端适配：自动变成上下布局，不挤压内容 */
        @media (max-width: 1200px) {
            body {
                flex-direction: column;
                gap: 40px;
                padding: 30px;
            }
            .photo-card {
                width: 90%;
                height: auto;
                aspect-ratio: 4/3; /* 保持照片比例，不拉伸 */
            }
            .letter-card {
                width: 90%;
                min-height: auto;
                padding: 40px 30px;
            }
            .letter-content {
                font-size: 1.3rem;
                line-height: 2;
            }
        }
    </style>
</head>
<body>
<!-- 左侧照片：替换src为你的朋友照片即可（建议高清，比例4:3） -->
<div class="photo-card">
    <img src="1.jpg" alt="刘雨珍">
</div>

<!-- 右侧书信：直接修改文字内容，保留格式即可 -->
<div class="letter-card">
    <p class="letter-title">亲爱的刘雨珍：</p>
    <div class="letter-content">
        <p>又陪你长大一岁啦！很开心能在你的生命里，做你最靠谱的朋友，分享你的喜怒哀乐，见证你的每一次成长。</p>
        <p>新的一岁，愿你平安喜乐，万事顺意，想要的都得到，想不到的惊喜也都奔你而来。</p>
        <p>未来的日子，我们还要一起吃很多很多饭，去很多很多地方，做很多很多有意思的事！</p>
        <p>生日快乐，我的好朋友！永远爱你~</p>
    </div>
    <p class="letter-sign">—— 永远爱你的XX</p>
</div>

<script>
    // 音乐续播：确保书信页生日歌继续循环，全程不中断
    window.addEventListener('pageshow', () => {
        try {
            const bgm = window.opener?.document.getElementById('birthdayMusic');
            if (bgm && bgm.paused) bgm.play();
        } catch (e) {}
    });
</script>
</body>
</html>
