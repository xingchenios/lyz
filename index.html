<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日祝福放映</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            overflow: hidden;
            background: #f8f8f8;
        }
        /* 全局放映容器 */
        .slideshow-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        /* 每一页的样式，默认隐藏 */
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1.2s ease-in-out; /* 淡入淡出过渡，像PPT翻页 */
            pointer-events: none;
        }
        /* 当前激活的页 */
        .slide.active {
            opacity: 1;
            pointer-events: auto;
        }
        /* 第1页：首页样式 */
        #page1 {
            background: linear-gradient(135deg, #ffe6f1, #ffd6e0);
        }
        .page1-card {
            background: white;
            padding: 4rem 6rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2);
            text-align: center;
        }
        .page1-title {
            font-size: 3rem;
            color: #ff69b4;
            margin-bottom: 1.5rem;
        }
        .page1-text {
            font-size: 1.3rem;
            color: #666;
            line-height: 2;
            margin-bottom: 2.5rem;
        }
        .start-btn {
            padding: 1rem 3rem;
            background: #ff69b4;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.3rem;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .start-btn:hover {
            transform: scale(1.05);
        }
        /* 第2页：烟花页样式 */
        #page2 {
            background: linear-gradient(180deg, #ffd6e0, #fff0f5);
        }
        .fireworks-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .fireworks-text {
            position: relative;
            z-index: 2;
            font-size: 4rem;
            color: #ff1493;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
        }
        /* 第3页：照片+文字页样式 */
        #page3 {
            background: #fff0f5;
        }
        .page3-content {
            display: flex;
            align-items: center;
            gap: 4rem;
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .page3-img {
            width: 350px;
            height: 350px;
            border-radius: 15px;
            object-fit: cover;
        }
        .page3-text {
            max-width: 500px;
            line-height: 2;
            font-size: 1.2rem;
            color: #333;
        }
        .page3-sign {
            margin-top: 2rem;
            text-align: right;
            font-size: 1.1rem;
            color: #666;
        }
    </style>
</head>
<body>
<div class="slideshow-container">
    <!-- 第1页：首页 -->
    <div class="slide active" id="page1">
        <div class="page1-card">
            <h1 class="page1-title">🎂 生日祝福</h1>
            <p class="page1-text">
                致我最亲爱的朋友：<br>
                愿你岁岁平安，年年欢喜。
            </p>
            <button class="start-btn" id="startBtn">点击放映</button>
        </div>
    </div>

    <!-- 第2页：烟花动画页 -->
    <div class="slide" id="page2">
        <canvas class="fireworks-canvas" id="fireworks"></canvas>
        <div class="fireworks-text">生日快乐！</div>
    </div>

    <!-- 第3页：照片+文字页 -->
    <div class="slide" id="page3">
        <div class="page3-content">
            <img src="1.jpg" class="page3-img" alt="照片">
            <div class="page3-text">
                <p>
                    亲爱的：<br><br>
                    又陪你长大一岁啦！新的一年，愿你所有的美好都如约而至，所有的期待都不负所望。
                    往后的日子，我们一起吃很多饭、走很多路、看很多风景。<br><br>
                    生日快乐，永远爱你！
                </p>
                <div class="page3-sign">—— 你的朋友</div>
            </div>
        </div>
    </div>
</div>

<!-- 音乐播放器：全程后台运行 -->
<audio id="bgm" loop src="https://videotourl.com/audio/1775211816011-d961c3c0-1843-492d-9ca4-15aed175e8cc.mp3">

    <script>
        // 核心控制：PPT式放映逻辑
        const slides = document.querySelectorAll('.slide');
        const startBtn = document.getElementById('startBtn');
        const bgm = document.getElementById('bgm');
        let currentSlide = 0;

        // 点击开始放映
        startBtn.addEventListener('click', () => {
            // 1. 播放音乐（用户交互触发，不会被拦截）
            bgm.play();

            // 2. 切换到第2页（烟花页）
            goToSlide(1);

            // 3. 第2页显示5秒后，自动切换到第3页
            setTimeout(() => {
                goToSlide(2);
            }, 5000);
        });

        // 切换页面的函数（带淡入淡出动画）
        function goToSlide(index) {
            slides[currentSlide].classList.remove('active');
            slides[index].classList.add('active');
            currentSlide = index;
        }

        // 烟花动画（和之前的效果一样）
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let fireworks = [];
        let particles = [];
        const colors = ['#ff69b4', '#ff1493', '#ff6347', '#ffd700', '#7fff00'];

        class Firework {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height;
                this.speed = Math.random() * 4 + 2;
                this.angle = Math.random() * Math.PI * 2;
                this.vx = Math.cos(this.angle) * this.speed;
                this.vy = -this.speed;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.targetY = Math.random() * canvas.height / 2;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            isExploded() {
                return this.vy >= 0 || this.y <= this.targetY;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.speed = Math.random() * 5 + 1;
                this.angle = Math.random() * Math.PI * 2;
                this.vx = Math.cos(this.angle) * this.speed;
                this.vy = Math.sin(this.angle) * this.speed;
                this.color = color;
                this.alpha = 1;
                this.decay = Math.random() * 0.01 + 0.005;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = this.color.replace(')', `,${this.alpha})`).replace('rgb', 'rgba');
                ctx.fill();
            }
            isDead() {
                return this.alpha <= 0;
            }
        }

        function loop() {
            ctx.fillStyle = 'rgba(255, 240, 245, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (Math.random() < 0.03) fireworks.push(new Firework());

            fireworks.forEach((fw, i) => {
                fw.update();
                fw.draw();
                if (fw.isExploded()) {
                    for (let j = 0; j < 50; j++) {
                        particles.push(new Particle(fw.x, fw.y, fw.color));
                    }
                    fireworks.splice(i, 1);
                }
            });

            particles.forEach((p, i) => {
                p.update();
                p.draw();
                if (p.isDead()) particles.splice(i, 1);
            });

            requestAnimationFrame(loop);
        }
        loop();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
