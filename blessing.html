<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刘雨珍生日快乐</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            width: 100vw;
            height: 100vh;
            /* 浪漫粉白渐变背景，和首页/书信页统一 */
            background: linear-gradient(180deg, #f8c8dc 0%, #ffe6f0 50%, #fff5f8 100%);
            overflow: hidden;
            position: relative;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }
        /* 居中生日大字：粉色主色，柔和阴影 */
        .main-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            font-weight: bold;
            color: #a83267;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 0 40px rgba(168, 50, 103, 0.3);
            z-index: 20;
            opacity: 0;
            transition: opacity 1s ease 0.5s;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }
        /* 手机端适配：字体自适应，不挤压 */
        @media (max-width: 768px) {
            .main-text {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
<div class="main-text" id="blessingText">刘雨珍生日快乐</div>
<canvas id="fireworksCanvas"></canvas>

<script>
    const canvas = document.getElementById('fireworksCanvas');
    const ctx = canvas.getContext('2d');
    const blessingText = document.getElementById('blessingText');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let fireworks = [];
    let particles = [];
    const random = (min, max) => Math.random() * (max - min) + min;
    // 浪漫粉色系烟花配色，和全套风格高度统一
    const colors = ['#ff6b9d', '#d63384', '#ff9acd', '#ff69b4', '#ffb6c1', '#f8c8dc', '#ffd700'];

    // 烟花类：高频发射，2-5个同时升空，实现轰轰烈烈的效果
    class Firework {
        constructor() {
            this.x = random(0, canvas.width);
            this.y = canvas.height;
            this.speedY = random(-18, -12); // 更快的升空速度
            this.speedX = random(-4, 4);
            this.color = colors[Math.floor(random(0, colors.length))];
            this.size = 3;
            this.targetY = random(canvas.height / 5, canvas.height / 2); // 更高的绽放高度
        }
        update() {
            this.y += this.speedY;
            this.x += this.speedX;
            this.speedY += 0.03; // 轻微重力，升空更丝滑
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            // 拖尾效果，让升空轨迹更明显
            ctx.beginPath();
            ctx.arc(this.x, this.y + 6, this.size / 1.5, 0, Math.PI * 2);
            ctx.fillStyle = `${this.color}80`;
            ctx.fill();
        }
        isExplode() {
            return this.y <= this.targetY;
        }
    }

    // 粒子类：每个烟花100-200个粒子，超密集绽放，视觉拉满
    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.speedY = random(-10, 10);
            this.speedX = random(-10, 10);
            this.color = color;
            this.size = random(1.5, 4);
            this.alpha = 1;
            this.gravity = 0.08; // 轻微重力，粒子下落更自然
            this.decay = random(0.01, 0.025); // 慢一点渐隐，绽放更持久
        }
        update() {
            this.speedY += this.gravity;
            this.x += this.speedX;
            this.y += this.speedY;
            this.alpha -= this.decay;
            this.speedX *= 0.98;
            this.speedY *= 0.98;
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            // 闪光副粒子，让烟花更绚烂
            ctx.beginPath();
            ctx.arc(this.x - this.speedX*0.5, this.y - this.speedY*0.5, this.size/2, 0, Math.PI * 2);
            ctx.fillStyle = `${this.color}60`;
            ctx.fill();
            ctx.restore();
        }
        isDead() {
            return this.alpha <= 0;
        }
    }

    // 高频创建烟花：几乎不间断发射，实现轰轰烈烈的视觉效果
    function createFirework() {
        const num = Math.floor(random(2, 5)); // 每次2-5个烟花同时发射
        for (let i = 0; i < num; i++) {
            fireworks.push(new Firework());
        }
    }

    // 烟花绽放：生成大量粒子，密集炸开
    function explodeFirework(firework) {
        const particleNum = Math.floor(random(100, 200));
        for (let i = 0; i < particleNum; i++) {
            particles.push(new Particle(firework.x, firework.y, firework.color));
        }
    }

    // 动画循环：持续渲染，保留拖尾，丝滑不卡顿
    function animate() {
        // 半透明背景层，保留烟花拖尾效果
        ctx.fillStyle = 'rgba(255, 245, 248, 0.1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 超高频率触发烟花，15帧一次，几乎全屏都有烟花
        if (Math.floor(random(0, 15)) === 0) {
            createFirework();
        }

        // 更新并渲染烟花
        for (let i = fireworks.length - 1; i >= 0; i--) {
            const firework = fireworks[i];
            firework.update();
            firework.draw();
            // 到达高度立即绽放，移除烟花
            if (firework.isExplode()) {
                explodeFirework(firework);
                fireworks.splice(i, 1);
            }
        }

        // 更新并渲染粒子
        for (let i = particles.length - 1; i >= 0; i--) {
            const particle = particles[i];
            particle.update();
            particle.draw();
            // 粒子渐隐后移除，优化性能
            if (particle.isDead()) {
                particles.splice(i, 1);
            }
        }

        requestAnimationFrame(animate);
    }

    // 初始化：启动动画+显示文字+8秒跳转
    function init() {
        animate();
        blessingText.style.opacity = 1;
        // 8秒后自动跳转到书信照片页，可修改毫秒数调整时间
        setTimeout(() => {
            window.location.href = './photo.html';
        }, 8000);
    }

    // 窗口大小适配：屏幕缩放后烟花正常显示
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    // 音乐续播：确保跳转后生日歌继续循环，不中断
    window.addEventListener('pageshow', () => {
        try {
            const bgm = window.opener?.document.getElementById('birthdayMusic');
            if (bgm && bgm.paused) bgm.play();
        } catch (e) {}
    });

    // 启动烟花页
    init();
</script>
</body>
</html>
